<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LearnLens Video AI</title>
    <link
      rel="stylesheet"
      href="https://static.testpress.in/static/learnlens/learnlens-frontend.css"
    />
    <style>
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
        background: transparent;
      }
      #learnlens-video-ai {
        position: fixed;
        top: 0;
        right: 0;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="learnlens-video-ai"></div>
    <script type="module">
      import "https://static.testpress.in/static/learnlens/videochat/index.es.js";

      function safeString(v) {
        return v === null || v === undefined ? "" : String(v);
      }

      function parseNumber(v) {
        const n = Number(v);
        return Number.isFinite(n) ? n : null;
      }

      function requestClose() {
        try {
          if (
            window.AndroidVideoAI &&
            typeof window.AndroidVideoAI.requestClose === "function"
          ) {
            window.AndroidVideoAI.requestClose();
          }
        } catch (e) {
          // ignore
        }
      }

      function seekTo(seconds) {
        const t = parseNumber(seconds);
        if (t === null || t < 0) return;
        try {
          if (
            window.AndroidVideoAI &&
            typeof window.AndroidVideoAI.onSeek === "function"
          ) {
            window.AndroidVideoAI.onSeek(String(t));
          }
        } catch (e) {
          // ignore
        }
      }

      function initializeLearnLensVideoAI() {
        const mountTargetId = "learnlens-video-ai";
        const mountTarget = document.getElementById(mountTargetId);
        if (!mountTarget || mountTarget.dataset.learnlensMounted === "true")
          return;

        if (!window.LearnLens || !window.LearnLens.mountVideoAI) {
          console.error("LearnLens VideoAI widget is not available.");
          return;
        }

        window.LearnLens.mountVideoAI(mountTargetId, {
          assetId: safeString("{{ASSET_ID}}"),
          authToken: safeString("{{AUTH_TOKEN}}"),
          userId: safeString("{{USER_ID}}"),
          notesUrl: safeString("{{NOTES_URL}}"),
          activeTab: "chat",
          onClose: requestClose,
          onRequestClose: requestClose,
          onDismiss: requestClose,
          onSeek: seekTo,
        });

        mountTarget.dataset.learnlensMounted = "true";
      }

      if (document.readyState === "loading") {
        document.addEventListener(
          "DOMContentLoaded",
          initializeLearnLensVideoAI,
          { once: true },
        );
      } else {
        initializeLearnLensVideoAI();
      }
    </script>
  </body>
</html>
